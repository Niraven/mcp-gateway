<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">mcp-gateway architecture</title>
  <desc id="desc">AI clients connect to mcp-gateway, which enforces policy before forwarding calls to upstream MCP servers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#151A2E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1120" height="620" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="36" font-weight="700">mcp-gateway</text>
  <text x="56" y="106" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Local-first firewall for MCP tool calls</text>

  <g filter="url(#shadow)">
    <rect x="70" y="178" width="240" height="132" rx="18" fill="#111827" stroke="#334155"/>
    <text x="104" y="226" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">AI clients</text>
    <text x="104" y="260" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Claude Desktop</text>
    <text x="104" y="284" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Cursor / VS Code / Codex</text>

    <rect x="440" y="142" width="260" height="252" rx="22" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>
    <text x="486" y="192" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">Gateway policy</text>
    <text x="486" y="234" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Rate limit calls</text>
    <text x="486" y="264" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Scan inputs</text>
    <text x="486" y="294" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Block poisoned descriptors</text>
    <text x="486" y="324" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Detect descriptor drift</text>
    <text x="486" y="354" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui" font-size="16">Write redacted audit logs</text>

    <rect x="815" y="116" width="220" height="96" rx="16" fill="#111827" stroke="#334155"/>
    <text x="850" y="158" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">Filesystem</text>
    <text x="850" y="184" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">MCP server</text>

    <rect x="815" y="262" width="220" height="96" rx="16" fill="#111827" stroke="#334155"/>
    <text x="850" y="304" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">GitHub</text>
    <text x="850" y="330" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">MCP server</text>

    <rect x="815" y="408" width="220" height="96" rx="16" fill="#111827" stroke="#334155"/>
    <text x="850" y="450" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">Database</text>
    <text x="850" y="476" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">MCP server</text>
  </g>

  <path d="M315 244 H426" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  <path d="M418 236 L432 244 L418 252" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M702 244 C750 244 754 164 808 164" stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M796 156 L812 164 L797 173" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M702 268 H808" stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M796 260 L812 268 L796 276" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M702 292 C750 292 754 456 808 456" stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M796 448 L812 456 L797 465" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="70" y="440" width="630" height="86" rx="18" fill="#031A14" stroke="#16A34A"/>
  <text x="102" y="475" fill="#BBF7D0" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">[BLOCKED] malicious__steal_context</text>
  <text x="102" y="504" fill="#86EFAC" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">poison-override, poison-exfil, poison-hijack</text>
</svg>
